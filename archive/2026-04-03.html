<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fail Watch Archive – 2026-04-03</title>
    <style>
        :root {
            --bg: #0b1020;
            --panel: #121a2b;
            --text: #eaf0fb;
            --muted: #9aa8c7;
            --border: #26324a;
            --accent: #6ea8fe;
            --shadow: 0 12px 30px rgba(0,0,0,0.28);
        }
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
        }
        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 18px 60px;
        }
        a {
            color: var(--accent);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .toplinks {
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 18px;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }
        .card-top {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        .rank {
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            border: 1px solid transparent;
        }
        .lang {
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border-color: var(--border);
        }
        .score-big {
            font-size: 1.02rem;
            font-weight: 800;
            color: #fca5a5;
        }
        .cat-legal { background: rgba(239,68,68,0.14); color: #fecaca; border-color: rgba(239,68,68,0.35); }
        .cat-security { background: rgba(251,146,60,0.14); color: #fed7aa; border-color: rgba(251,146,60,0.35); }
        .cat-privacy { background: rgba(6,182,212,0.14); color: #a5f3fc; border-color: rgba(6,182,212,0.35); }
        .cat-hallucination { background: rgba(236,72,153,0.14); color: #fbcfe8; border-color: rgba(236,72,153,0.35); }
        .cat-research { background: rgba(139,92,246,0.14); color: #ddd6fe; border-color: rgba(139,92,246,0.35); }
        .cat-education { background: rgba(34,197,94,0.14); color: #bbf7d0; border-color: rgba(34,197,94,0.35); }
        .cat-general { background: rgba(110,168,254,0.14); color: #bfdbfe; border-color: rgba(110,168,254,0.35); }
        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            color: var(--muted);
            font-size: 0.92rem;
            margin-bottom: 14px;
        }
        .why {
            color: #bcd0f5;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="toplinks">
            <a href="../index.html">← Latest report</a>
            <a href="../archive.html">All archive days</a>
        </div>
        <h1>Archive – 2026-04-03</h1>
        <div class="grid">
            <p>No archived items for this day.</p>
        </div>
    </div>

    <script>
        function openLink(url) {
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
